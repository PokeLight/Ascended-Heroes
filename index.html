html,body{background:#111114 !important;margin:0;padding:0}

#pl-loader{position:fixed;inset:0;background:#0a0a0a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity 0.7s ease,visibility 0.7s ease}
#pl-loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{width:140px;height:140px;border-radius:28px;animation:glitch 3s ease-in-out infinite}
@keyframes glitch{0%,88%,100%{transform:translate(0);filter:none}89%{transform:translate(-5px,2px);filter:hue-rotate(90deg) brightness(1.4)}90%{transform:translate(5px,-2px);filter:hue-rotate(-90deg)}91%{transform:translate(0);filter:none}93%{transform:translate(3px,3px);filter:hue-rotate(180deg) brightness(1.2)}94%{transform:translate(-3px,-2px);filter:none}}
.ld-title-wrap{overflow:hidden}
.ld-title{font-family:'Rajdhani',sans-serif;font-size:72px;font-weight:700;color:#fff;letter-spacing:0.04em;line-height:1;animation:reveal 2.2s cubic-bezier(0.16,1,0.3,1) forwards}
.ld-title span{color:#E8181A}
@keyframes reveal{0%{clip-path:inset(0 100% 0 0);opacity:0.5}100%{clip-path:inset(0 0% 0 0);opacity:1}}
.ld-hex{display:flex;gap:10px}
.ld-h{font-family:monospace;font-size:15px;color:#333;animation:hexroll 1.8s linear infinite}
.ld-h:nth-child(1){animation-delay:0s}.ld-h:nth-child(2){animation-delay:0.12s}.ld-h:nth-child(3){animation-delay:0.24s}.ld-h:nth-child(4){animation-delay:0.36s}.ld-h:nth-child(5){animation-delay:0.48s}.ld-h:nth-child(6){animation-delay:0.6s}.ld-h:nth-child(7){animation-delay:0.72s}.ld-h:nth-child(8){animation-delay:0.84s}
@keyframes hexroll{0%,100%{opacity:0.15;color:#333}50%{opacity:1;color:#E8181A}}
.ld-line{width:500px;height:1px;background:#151515;position:relative;overflow:hidden;max-width:80vw}
.ld-line::after{content:'';position:absolute;left:-100%;top:0;height:100%;width:100%;background:linear-gradient(90deg,transparent,#E8181A,transparent);animation:sweep 1.6s linear infinite}
@keyframes sweep{0%{left:-100%}100%{left:200%}}
.ld-sub{font-family:'DM Sans',sans-serif;font-size:13px;color:#333;letter-spacing:0.16em;text-transform:uppercase}

<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap');
html,body{background:#111114 !important;margin:0;padding:0}
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#E8181A;--red-dark:#B01214;--black:#0a0a0a;--dark:#111114;--dark2:#1a1a1f;--dark3:#242429;--border:#2a2a30;--text:#f0f0f0;--muted:#777}
.pl{background:var(--dark);border-radius:0;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--text)}
.pl-hero{background:var(--black);padding:18px 24px;position:relative;border-bottom:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:16px}
.pl-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(232,24,26,0.12) 0%,transparent 70%);pointer-events:none}
.pl-hero-left{display:flex;align-items:flex-start;gap:14px;position:relative}
.pl-logo{width:50px;height:50px;border-radius:10px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 10px rgba(232,24,26,0.4))}
.pl-brand-col{display:flex;flex-direction:column;gap:3px}
.pl-brand{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:#fff;letter-spacing:0.03em;line-height:1}
.pl-brand span{color:var(--red)}
.pl-brand-sub{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.pl-set-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.pl-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;color:#fff;line-height:1.1;margin-bottom:2px}
.pl-title span{color:#fff}
.pl-sub{font-size:10px;color:var(--muted);letter-spacing:0.03em}
.pl-set-art{height:90px;width:auto;object-fit:contain;flex-shrink:0;margin-left:auto;opacity:0.95;filter:drop-shadow(0 0 16px rgba(232,24,26,0.25))}
.pl-stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.pl-stat{padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.pl-stat:last-child{border-right:none}
.pl-stat-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#fff}
.pl-stat-val.red{color:var(--red)}
.pl-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px}
.pl-controls{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.pl-search{position:relative}
.pl-search input{width:100%;padding:9px 14px 9px 36px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;font-size:13px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
.pl-search input::placeholder{color:var(--muted)}
.pl-search input:focus{border-color:var(--red)}
.pl-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted)}
.pl-pills{display:flex;gap:5px;flex-wrap:wrap}
.pl-pill{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pl-pill:hover{border-color:var(--red);color:var(--red)}
.pl-pill.on{background:var(--red);color:#fff;border-color:var(--red)}
.pl-grid-wrap{padding:14px}
.pl-count{font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:0.03em}
.pl-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
@media(max-width:900px){.pl-grid{grid-template-columns:repeat(5,1fr);gap:6px}}
@media(max-width:600px){.pl-grid{grid-template-columns:repeat(4,1fr);gap:5px}}
@media(max-width:400px){.pl-grid{grid-template-columns:repeat(3,1fr);gap:4px}}
.pl-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative}
.pl-card:hover{border-color:var(--red);transform:translateY(-3px);background:var(--dark3)}
.pl-card img{width:100%;aspect-ratio:2.5/3.5;object-fit:cover;display:block;background:var(--dark3)}
.pl-card-body{padding:5px 7px}
.pl-card-name{font-size:10px;font-weight:500;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-card-rarity{font-size:8px;color:var(--muted);margin-top:2px}
.pl-card-num{font-size:8px;color:#444;margin-top:1px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:30;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(6px)}
.modal-bg.on{display:flex}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:16px;max-width:720px;width:100%;overflow:hidden;position:relative;display:flex;flex-direction:row;max-height:90vh}
.modal-img-col{flex:0 0 360px;background:var(--dark3);display:flex;align-items:stretch}
.modal-img-col img{width:100%;object-fit:cover;display:block}
.modal-body{padding:28px 24px;display:flex;flex-direction:column;justify-content:center;flex:1}
.modal-name{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.1}
.modal-tag{display:inline-block;padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px}
.modal-num{font-size:13px;color:var(--muted);margin-bottom:24px}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.7);border:1px solid var(--border);color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-btn{display:block;width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.modal-btn:hover{background:var(--red-dark)}
@media(max-width:600px){.modal{flex-direction:column;max-width:340px}.modal-img-col{flex:0 0 auto}.modal-body{padding:16px}}
.pl-empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
</style>
